name: eight_dimension_deep_analysis
display_name: 八维深度分析
description: 使用商业模式、收入结构、行业景气、竞争格局、业绩弹性、风险评估、估值水平、催化因子八个维度，对个股做研究报告式深度分析。
category: framework
core_rules: [2, 3, 5, 6]
required_tools:
  - get_stock_info
  - get_realtime_quote
  - get_analysis_context
  - search_stock_news
  - search_comprehensive_intel
  - analyze_trend
  - get_sector_rankings
aliases: [八维, 八维分析, 深度分析, 基本面深度分析, 个股深度研究]
default_priority: 20
market_regimes: [trending_up, sideways, volatile]

instructions: |
  **八维深度分析框架**

  目标：从“能否买”升级为“这家公司当前风险收益比是否合理”。必须把事实、假设、推演分开，不允许只根据题材热度给结论。

  一、先建立数据面板
  - 明确数据日期、最新价、市值、近期涨跌幅、PE/PB/PS、历史估值分位（有则使用）。
  - 拉取收入、归母净利、扣非净利、毛利率、ROE、经营现金流、负债率等核心财务数据。
  - 检查新闻、公告、行业景气和资金/技术面是否与基本面互相印证。

  二、八维评分，每项 0-10 分，总分 80 分，并换算为百分制
  1. 商业模式：收入机制、毛利率、定价权、客户粘性、资产投入强度。
  2. 收入结构：产品/客户/区域/终端市场是否过度集中，第二增长曲线是否真实。
  3. 行业景气：行业周期、政策/技术驱动、订单和同业验证。
  4. 竞争格局：市占率、认证壁垒、专利标准、成本优势、进口替代。
  5. 业绩弹性：收入增长能否转化为利润和现金流，产能/产品结构是否带来杠杆。
  6. 风险评估：估值、现金流、原材料、杠杆、技术替代、情绪退潮等，分数越高代表风险越可控。
  7. 估值水平：当前估值是否已经透支未来 2-3 年乐观预期。
  8. 催化因子：短中期催化是否可验证、是否财务上有意义、是否已经被定价。

  三、输出结构
  - 数据面板：价格/市值/估值/业绩/总分/评级。
  - 八维评分表：维度、得分、说明。
  - 核心催化与核心风险：分别列出 3-5 条。
  - 业绩趋势与财务质量：特别指出“增收不增利”“利润增长但现金流恶化”等背离。
  - 主营业务拆解与护城河：收入占比、毛利率、行业地位、客户/技术/成本壁垒。
  - 投资逻辑链：从行业驱动到公司收入、利润、估值消化的因果链。
  - 三栏风险评估：已验证逻辑 / 待验证假设 / 核心风险。
  - 市值空间推演：乐观、中性、必要时悲观情景，写清利润假设、估值倍数、隐含市值和上下行空间。
  - 技术面与资金面：只作辅助验证，不用短线强势掩盖估值和基本面问题。

  四、结论必须指出核心矛盾
  示例格式：
  “核心矛盾：长期逻辑（...）清晰，但短期估值/现金流/兑现节奏（...）无法完全支撑当前市值。”

  评分标签：
  - 72-80：高确定性机会
  - 64-71：积极关注
  - 56-63：谨慎乐观
  - 48-55：中性观察
  - 40-47：谨慎回避
  - 40 以下：高风险

  若估值水平低于 4/10，必须显式讨论“当前价格是否已经反映乐观预期”，不能只给利好叙事。
