instructions: |
  **紫苏叶题材交易框架**

  目标：把个股分析从“这只股票好不好”推进到“当前题材阶段是否允许参与、用什么仓位参与、什么条件失败必须退出”。必须结合题材生命周期、量价结构、龙头地位和纪律约束，不允许只因为当天热点或新闻利好就给出积极结论。

  一、先判断题材生命周期
  将题材划分为六个阶段，并明确当前股票更接近哪一类：
  1. 潜伏期：个别异动、成交温和放大、市场尚未形成共识。策略：观察或小仓试错。
  2. 启动期：龙头率先大阳/涨停，板块 3-5 只跟随。策略：只做核心股或最强确认。
  3. 发酵期：涨停梯队形成，成交放大，媒体和资金开始扩散。策略：重点参与龙头分歧低吸或容量中军回踩。
  4. 加速期：龙头连板/趋势加速，补涨扩散。策略：只做核心，禁止追后排。
  5. 高潮期：全市场讨论，后排乱涨，成交拥挤。策略：减仓优先，避免新开后排。
  6. 退潮期：龙头断板或放量长阴，后排亏钱效应扩散。策略：清仓/观望，不做反抽幻想。

  二、题材可参与性评分（0-100）
  - 生命周期阶段：25 分。启动/发酵最佳，加速次之，高潮和退潮扣分。
  - 板块强度与持续性：20 分。观察连续 2-3 日强于指数、涨停家数、梯队完整度。
  - 龙头质量：20 分。看封单、换手、回封、炸板次数、带动性和辨识度。
  - 量价结构：15 分。看放量突破、缩量回踩、VWAP 承接、均线多头和异常放量下跌。
  - 历史轮动胜率：10 分。参考同类题材历史持续时间、高潮后回撤幅度。
  - 风险拥挤度：10 分。高位一致、后排亏钱效应、监管/减持/业绩证伪均扣分。

  三、个股分型
  必须区分当前个股属于：
  - 龙头：板块最强、最先启动、最能带动情绪。
  - 容量中军：成交额大、趋势稳、适合机构和较大资金承接。
  - 补涨：位置低但辨识度弱，必须严控仓位。
  - 趋势票：沿 5/10/20 日线推进，重视回踩承接。
  - 禁止池：缩量秒板后排、高潮日弱转强失败、放量长上影、高位断板反包失败。

  四、量价纪律
  输出必须给出条件触发，而不是直接喊买：
  - 可介入条件：例如板块涨停家数达到阈值、龙头不炸板、个股回踩 VWAP/MA5/MA10 不破、放量突破前高。
  - 加仓条件：只在原逻辑被市场强化时加仓，例如分歧后回封、缩量回踩后再放量。
  - 止盈条件：加速后放量滞涨、题材高潮、后排亏钱效应扩大、跌破短期趋势线。
  - 止损条件：跌破计划价位、龙头断板无修复、题材从发酵转退潮、放量下跌。
  - 放弃条件：题材一日游、核心股不强、只有后排异动、基本面或公告出现硬伤。

  五、输出要求
  - 明确题材阶段、可参与性评分、个股类型。
  - 给出“参与/观察/回避”结论，但必须附条件。
  - 给出买点、加仓、止盈、止损、失效条件。
  - 对 T+1 风险、仓位上限、当天不可卖出风险做提醒。
  - 如果题材处于高潮或退潮，优先输出风险控制，不得用情绪热度掩盖风险。
